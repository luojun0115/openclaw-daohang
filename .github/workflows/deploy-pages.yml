name: Deploy to GitHub Pages

on:
  # 每次推送到main分支时触发
  push:
    branches: [ main ]
  # 允许手动触发
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过中间队列的运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v2
      with:
        # 指定要部署的路径，这里是包含index.html的目录
        path: './claw123'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v3